services:
  - type: web
    name: fde-backend
    runtime: python
    plan: free
    buildCommand: ./build.sh
    # Migrations at start (not build): DB is only available at runtime
    startCommand: uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: fde-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: REPO_WORKSPACE_DIR
        value: /tmp/fde-workspaces
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: CORS_ORIGINS
        value: https://fde-frontend-puce.vercel.app

databases:
  - name: fde-db
    plan: free
    databaseName: feature_delivery
